<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Household Cash Flow Planner</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --line: #d1d5db;
        --text: #111827;
        --muted: #6b7280;
        --ok: #065f46;
        --bad: #b91c1c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 1rem;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.35rem, 2.2vw, 1.9rem);
      }

      .box {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 0.85rem;
      }

      .box h2 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }

      .muted { color: var(--muted); }

      .slider-row { margin-top: 0.65rem; }

      .slider-row label {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .hints {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 0.8rem;
        margin-top: 0.2rem;
      }

      input[type='range'] {
        width: 100%;
        margin-top: 0.4rem;
      }

      .result {
        font-size: clamp(1.2rem, 2.4vw, 1.8rem);
        font-weight: 800;
      }

      .result.good { color: var(--ok); }
      .result.bad { color: var(--bad); }
    </style>
  </head>
  <body>
    <main>
      <h1>Household Cash Flow Planner</h1>

      <section class="box" aria-label="Income range">
        <h2>Income Range</h2>
        <div class="result" id="incomeRangeLabel">$10,440 - $11,904</div>
      </section>

      <section class="box" aria-label="Supplemental income">
        <h2>Supplemental Income</h2>
        <div class="slider-row">
          <label for="supplementalIncome">
            Supplemental Income / month
            <span id="supplementalIncomeValue">$0</span>
          </label>
          <input
            id="supplementalIncome"
            type="range"
            min="0"
            max="5000"
            step="1"
            value="0"
          />
          <div class="hints"><span>$0</span><span>$5,000</span></div>
        </div>
      </section>

      <section class="box" aria-label="Housing cost">
        <h2>Housing Cost</h2>
        <div class="slider-row">
          <label for="housing">
            Housing / month
            <span id="housingValue">$4,550</span>
          </label>
          <input id="housing" type="range" min="0" max="9000" step="1" value="4550" />
          <div class="hints"><span>$0</span><span>$9,000</span></div>
        </div>
      </section>

      <section class="box" aria-label="Other fixed expenses">
        <h2>Other Fixed Expenses</h2>

        <div class="slider-row">
          <label for="childcare">
            Childcare / month
            <span id="childcareValue">$2,400</span>
          </label>
          <input id="childcare" type="range" min="0" max="3000" step="1" value="2400" />
          <div class="hints"><span>$0</span><span>$3,000</span></div>
        </div>

        <div class="slider-row">
          <label for="car">
            Car / month
            <span id="carValue">$400</span>
          </label>
          <input id="car" type="range" min="0" max="500" step="1" value="400" />
          <div class="hints"><span>$0</span><span>$500</span></div>
        </div>

        <div class="slider-row">
          <label for="cleaning">
            Cleaning / month
            <span id="cleaningValue">$200</span>
          </label>
          <input id="cleaning" type="range" min="0" max="300" step="1" value="200" />
          <div class="hints"><span>$0</span><span>$300</span></div>
        </div>

        <div class="slider-row">
          <label for="storage">
            Storage expenses / month
            <span id="storageValue">$150</span>
          </label>
          <input id="storage" type="range" min="0" max="200" step="1" value="150" />
          <div class="hints"><span>$0</span><span>$200</span></div>
        </div>

        <div class="slider-row">
          <label for="cellphoneInternet">
            Cellphone / Internet / month
            <span id="cellphoneInternetValue">$100</span>
          </label>
          <input
            id="cellphoneInternet"
            type="range"
            min="100"
            max="300"
            step="1"
            value="100"
          />
          <div class="hints"><span>$100</span><span>$300</span></div>
        </div>
      </section>

      <section class="box" aria-label="Estimated monthly cash flow after fixed expenses">
        <h2>Estimated Monthly Cash Flow After Fixed Expenses</h2>
        <div id="cashFlowResult" class="result good">$3,140 to $4,604</div>
      </section>
    </main>

    <script>
      const incomeLow = 10440;
      const incomeHigh = 11904;

      const fmt = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 0,
      });

      const sliderIds = [
        'supplementalIncome',
        'housing',
        'childcare',
        'car',
        'cleaning',
        'storage',
        'cellphoneInternet',
      ];

      function value(id) {
        return Number(document.getElementById(id).value) || 0;
      }

      function update() {
        const supplementalIncome = value('supplementalIncome');
        const housing = value('housing');
        const childcare = value('childcare');
        const car = value('car');
        const cleaning = value('cleaning');
        const storage = value('storage');
        const cellphoneInternet = value('cellphoneInternet');

        document.getElementById('supplementalIncomeValue').textContent = fmt.format(supplementalIncome);
        document.getElementById('housingValue').textContent = fmt.format(housing);
        document.getElementById('childcareValue').textContent = fmt.format(childcare);
        document.getElementById('carValue').textContent = fmt.format(car);
        document.getElementById('cleaningValue').textContent = fmt.format(cleaning);
        document.getElementById('storageValue').textContent = fmt.format(storage);
        document.getElementById('cellphoneInternetValue').textContent = fmt.format(cellphoneInternet);

        const fixedTotal = housing + childcare + car + cleaning + storage + cellphoneInternet;
        const netLow = incomeLow + supplementalIncome - fixedTotal;
        const netHigh = incomeHigh + supplementalIncome - fixedTotal;

        const result = document.getElementById('cashFlowResult');
        result.textContent = `${fmt.format(netLow)} to ${fmt.format(netHigh)}`;
        result.className = `result ${netLow < 0 || netHigh < 0 ? 'bad' : 'good'}`;
      }

      sliderIds.forEach((id) => {
        document.getElementById(id).addEventListener('input', update);
      });

      update();
    </script>
  </body>
</html>
